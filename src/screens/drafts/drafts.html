      <!-- ═══════════════════════════════════════════════════════════════
           SCREEN: DRAFTS — saved drafts list (like outbox).
           Each draft: { answers, mediaFiles, pageIdx, fieldIdx, savedAt, label }
           #drafts-list populated by renderDrafts(); resumeDraft(i) / deleteDraft(i)
      ══════════════════════════════════════════════════════════════════ -->
      <div class="screen" id="screen-drafts">
        <div class="screen-scroll">
          <div id="drafts-header-label" class="list-header">Bozze salvate</div>
          <!-- Persistence note (set by renderDrafts) -->
          <div id="drafts-persist-note" class="persist-note"></div>
          <div id="drafts-list" class="list"></div>
        </div>
      </div>
