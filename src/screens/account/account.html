      <!-- ═══════════════════════════════════════════════════════════════
           SCREEN: ACCOUNT — logged user details and client-side logout.
      ══════════════════════════════════════════════════════════════════ -->
      <div class="screen" id="screen-account">
        <div class="screen-scroll">
          <div class="account-panel">
            <div class="account-avatar" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 0 0-16 0"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div class="account-label" id="account-label">Utente loggato</div>
            <div class="account-name" id="account-name"></div>
            <div class="account-username" id="account-username"></div>
            <button class="btn-lang-change" id="account-lang-btn" type="button" onclick="homeLangChange()">
              <span class="lang-icon" aria-hidden="true">🌐</span>
              <span class="btn-lang-label">Cambia lingua</span>
            </button>
            <button class="account-logout-btn" id="account-logout-btn" onclick="logout()">Disconnetti</button>
          </div>
        </div>
        <!-- Bottom nav: Home (50% width, end-aligned, RTL-aware) -->
        <div class="screen-nav">
          <button class="btn-home" type="button" onclick="goHome()">
            <span class="btn-home-arrow" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="10 16 5 12 10 8"/></svg></span>
            <span class="btn-home-label">Home</span>
          </button>
        </div>
      </div>
