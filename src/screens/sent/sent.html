      <!-- ═══════════════════════════════════════════════════════════════
           SCREEN: SENT — sent forms (read-only, text only).
           Same layout as drafts/outbox. #sent-list populated by renderSent();
           a row opens showSentDetail(i). No media is stored (only field values
           and file names).
      ══════════════════════════════════════════════════════════════════ -->
      <div class="screen" id="screen-sent">
        <div class="screen-scroll">
          <div id="sent-header-label" class="list-header">Moduli inviati</div>
          <div id="sent-list" class="list"></div>
        </div>
        <!-- Bottom nav: Home (50% width, end-aligned, RTL-aware) -->
        <div class="screen-nav">
          <button class="btn-home" type="button" onclick="goHome()">
            <span class="btn-home-arrow">←</span>
            <span class="btn-home-label">Home</span>
          </button>
        </div>
      </div>
