      <!-- ═══════════════════════════════════════════════════════════════
           SCREEN: OUTBOX
           Completed forms (markComplete()) waiting to be sent.

           Each outbox item: { answers, mediaFiles, savedAt, label }
           #outbox-list: populated by renderOutbox().

           Per-form actions: sendSingle(i) → doSubmit() · deleteSingle(i) → remove.
           "Send all" → sendAllOutbox() → loops doSubmit().
      ══════════════════════════════════════════════════════════════════ -->
      <div class="screen" id="screen-outbox">
        <div class="screen-scroll" id="outbox-list-wrap">
          <div id="outbox-header-label" class="list-header">In attesa di invio</div>
          <!-- Persistence note (set by renderOutbox) -->
          <div id="outbox-persist-note" class="persist-note"></div>
          <!-- Debug/status box (set by renderOutbox) -->
          <div id="outbox-debug" class="outbox-debug" style="display:none"></div>
          <!-- Items populated by renderOutbox() -->
          <div id="outbox-list" class="list"></div>
          <div class="send-all-box">
            <button
              onclick="sendAllOutbox()"
              id="send-all-btn"
              class="send-all-btn">
              Invia tutti
            </button>
          </div>
        </div>
        <!-- Bottom nav: Home (50% width, end-aligned, RTL-aware) -->
        <div class="screen-nav">
          <button class="btn-home" type="button" onclick="goHome()">
            <span class="btn-home-arrow">←</span>
            <span class="btn-home-label">Home</span>
          </button>
        </div>
      </div>
