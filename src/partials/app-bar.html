<!-- =========================================================================
     App bar — navigation chrome (back, title, page pill, language) + progress
     bar. SHARED partial used by app.html (PWA) and demo.html: edit here to keep
     the two pages in sync.
========================================================================= -->
<div class="app-bar" id="app-bar">
  <button
    id="bar-back-btn"
    class="bar-back-btn"
    onclick="barBack()"
    style="display:none">
    <span id="bar-back-arrow" class="bar-back-arrow">←</span>
    <span id="bar-back-label" class="bar-back-label">Home</span>
  </button>
  <span class="bar-title" id="bar-title">La valigia immateriale</span>
  <span class="progress-pill" id="pill" style="display:none">1 / 9</span>
  <button
    id="lang-btn"
    class="bar-lang-btn"
    onclick="changeLang()"
    style="display:none"
    aria-label="Cambia lingua">
    🌐
  </button>
  <button
    id="bar-user-btn"
    class="bar-user-btn"
    onclick="showAccount()"
    style="display:none"
    aria-label="Account">
    <span class="bar-user-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21a8 8 0 0 0-16 0"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </span>
    <span class="bar-user-name" id="bar-user-name"></span>
  </button>
</div>

<!-- Progress track: thin line under the app bar -->
<div class="progress-track" id="prog-track" style="display:none">
  <div class="progress-fill" id="prog-fill"></div>
</div>
