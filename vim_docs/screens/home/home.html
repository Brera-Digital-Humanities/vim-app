      <!-- ═══════════════════════════════════════════════════════════════
           SCREEN: HOME — main menu (KoBoCollect-style)
           Voci: Compila modulo · Cambia lingua · Modifica bozza ·
                 Moduli da inviare (badge) · Moduli inviati
           (Il form è già incorporato dal sync Kobo: nessun "scarica modulo".)
      ══════════════════════════════════════════════════════════════════ -->
      <div class="screen" id="screen-home">
        <div class="home-screen">

          <!-- Brand header -->
          <div class="home-brand">
            <h2>La valigia immateriale</h2>
            <div class="brand-version">v1.0 · beta</div>
          </div>

          <!-- Sezione principale -->
          <div class="home-section-label">Azioni principali</div>
          <div class="home-menu">

            <!-- Compila modulo — bottone primario scuro -->
            <div class="menu-item primary" onclick="startFillForm()">
              <div class="mi-icon">📝</div>
              <div class="mi-body">
                <div class="mi-title">Compila modulo</div>
                <div class="mi-sub">Avvia il questionario</div>
              </div>
              <span class="mi-arrow">›</span>
            </div>

            <!--
              Cambia lingua — il testo nel .mi-sub mostra la lingua attiva.
              Mostrata da applyUILang() dopo la scelta iniziale della lingua.
            -->
            <div class="menu-item" id="home-lang-item" onclick="homeLangChange()" style="display:none">
              <div class="mi-icon">🌐</div>
              <div class="mi-body">
                <div class="mi-title">Cambia lingua</div>
                <div class="mi-sub" id="home-lang-sub">—</div>
              </div>
              <span class="mi-arrow">›</span>
            </div>
          </div>

          <!-- Sezione archivio -->
          <div class="home-section-label">Archivio</div>
          <div class="home-menu">

            <!-- Modifica bozza -->
            <div class="menu-item" onclick="showDraft()">
              <div class="mi-icon">✏️</div>
              <div class="mi-body">
                <div class="mi-title">Modifica bozza</div>
                <div class="mi-sub">Riprendi una compilazione</div>
              </div>
              <span class="mi-arrow">›</span>
            </div>

            <!--
              Moduli da inviare (outbox)
              #outbox-badge: badge numerico rosso-arancio, hidden se outbox vuota.
              Aggiornato da updateOutboxBadge() in navigation.js.
            -->
            <div class="menu-item" onclick="showOutbox()">
              <div class="mi-icon">📤</div>
              <div class="mi-body">
                <div class="mi-title">Moduli da inviare</div>
                <div class="mi-sub">In attesa di connessione</div>
              </div>
              <span class="mi-arrow">›</span>
              <span class="menu-badge" id="outbox-badge" style="display:none">0</span>
            </div>

            <!-- Moduli inviati -->
            <div class="menu-item" onclick="showSent()">
              <div class="mi-icon">✅</div>
              <div class="mi-body">
                <div class="mi-title">Moduli inviati</div>
                <div class="mi-sub">Visualizza risposte inviate</div>
              </div>
              <span class="mi-arrow">›</span>
            </div>
          </div>

          <!-- Indicatore connessione: online/offline (aggiornato da connectivity.js) -->
          <div class="home-status" id="conn-status">
            <div class="hs-dot"></div>
            <div class="hs-text" id="conn-text">—</div>
          </div>

        </div>
      </div>
