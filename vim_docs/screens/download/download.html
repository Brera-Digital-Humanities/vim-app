      <!-- ═══════════════════════════════════════════════════════════════
           SCREEN: SCARICA MODULO
           Simula la schermata "Get Blank Form" di KoBoCollect.
           
           In questa implementazione il form è già hardcoded nell'HTML
           (dati da XLS in PAGES/CHOICES in navigation.js), quindi
           "scarica" è una simulazione con delay di 0.8s.
           
           In una futura integrazione Enketo Express, qui si può chiamare
           l'API /api/v2/survey per scaricare la definizione XForm aggiornata.
      ══════════════════════════════════════════════════════════════════ -->
      <div class="screen" id="screen-download">
        <div class="home-screen">

          <!-- Header server -->
          <div style="padding:20px 20px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;">
            <div style="font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;" id="dl-server-label">Server</div>
            <div style="font-size:.82rem;color:var(--ink);font-weight:500;">eu.kobotoolbox.org</div>
          </div>

          <!-- Label moduli disponibili -->
          <div style="padding:16px 16px 8px;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);" id="dl-avail-label">Moduli disponibili</div>

          <!-- Riga modulo con checkbox -->
          <div style="padding:0 16px;">
            <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;" onclick="toggleFormSelect()">
              <!--
                #form-checkbox: checkbox custom.
                Stato vuoto = non selezionato.
                Stato selezionato = background accent + checkmark bianco.
                Gestito da toggleFormSelect() in navigation.js.
              -->
              <div id="form-checkbox" style="width:22px;height:22px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;"></div>
              <div style="flex:1;">
                <div style="font-size:.88rem;font-weight:500;color:var(--ink);" id="dl-form-name">La valigia immateriale</div>
                <!--
                  #form-dl-status: aggiornato da executeDownload() dopo il download.
                  Valori possibili: tr().notDl / tr().downloaded
                -->
                <div style="font-size:.72rem;color:var(--muted);margin-top:2px;" id="form-dl-status">Non scaricato</div>
              </div>
            </div>
          </div>

          <!-- Bottone download -->
          <div style="padding:16px;flex-shrink:0;">
            <!--
              #dl-btn: disabled finché non si seleziona il modulo.
              onclick → executeDownload() in api.js.
              Dopo il download (0.8s delay) → goHome() direttamente (no lang screen).
            -->
            <button
              onclick="executeDownload()"
              id="dl-btn"
              disabled
              style="width:100%;padding:13px;border:none;border-radius:10px;background:var(--muted);color:#fff;font-family:'DM Sans',sans-serif;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;cursor:not-allowed;transition:background .2s;">
              Scarica selezionati
            </button>
          </div>

          <!-- Area messaggi risultato download -->
          <div id="dl-result" style="padding:0 16px;"></div>

        </div>
      </div>
