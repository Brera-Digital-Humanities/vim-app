      <!-- ═══════════════════════════════════════════════════════════════
           SCREEN: OUTBOX
           Moduli completati (markComplete()) in attesa di invio.
           
           Ogni voce outbox: { answers, mediaFiles, savedAt, label }
           
           #outbox-list: popolato da renderOutbox() in navigation.js
           
           Azioni per singolo modulo:
             sendSingle(i)  → doSubmit() in api.js
             deleteSingle(i) → rimuove dalla coda
           
           "Invia tutti" → sendAllOutbox() → loop doSubmit()
      ══════════════════════════════════════════════════════════════════ -->
      <div class="screen" id="screen-outbox">
        <div class="home-screen" id="outbox-list-wrap">
          <div style="color:var(--muted);" id="outbox-header-label" class="outbox-header-label">In attesa di invio</div>
          <!-- Voci populate da renderOutbox() -->
          <div id="outbox-list" class="outbox-list"></div>
          <div>
            <button
              onclick="sendAllOutbox()"
              id="send-all-btn"
              class="send-all-btn">
              Invia tutti
            </button>
          </div>
        </div>
      </div>
